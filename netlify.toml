[build]
  command = "git submodule update --init --recursive && npm install && npm run build"
  functions = "netlify/functions"
  publish = "."

[functions]
  node_bundler = "esbuild"
  included_files = ["src/**", "data/**"]

[[redirects]]
  from = "/mcp/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  [redirects.rate_limit]
    window_limit = 120
    window_size = 60
    aggregate_by = ["ip", "domain"]

[[redirects]]
  from = "/bridge/*"
  to = "/.netlify/functions/bridge/:splat"
  status = 200
  [redirects.rate_limit]
    window_limit = 60
    window_size = 60
    aggregate_by = ["ip", "domain"]
